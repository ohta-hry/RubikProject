<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 基本立方体</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        
        #container {
            text-align: center;
        }
        
        #canvas-container {
            display: inline-block;
            border: 2px solid #333;
            margin: 20px 0;
            background-color: white;
        }
        
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 5px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        
        button:hover {
            background-color: #45a049;
        }

        #controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 8px;
            max-width: 800px;
            margin: 0 auto;
        }

        #moves-input {
            width: min(320px, 90vw);
            padding: 8px;
            font-size: 16px;
        }

        #seek-bar {
            width: min(480px, 90vw);
        }

        #status-message {
            width: 100%;
            min-height: 1.5em;
            color: #333;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>Three.js 基本立方体</h1>
        
        <!-- 操作用UI -->
        <div id="controls">
            <input id="moves-input" type="text" value="R U R' U'" aria-label="操作記法">
            <button id="analyze-button" type="button">解析</button>
            <button id="play-button" type="button">再生</button>
            <input id="seek-bar" type="range" min="0" max="1000" value="0" aria-label="シークバー">
            <span id="seek-label">0%</span>
            <div id="status-message"></div>
        </div>
        
        <!-- Three.js用のcanvas -->
        <div id="canvas-container"></div>
        
        <p>マウスでドラッグして立方体を回転させることができます</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
                "OrbitControls": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/controls/OrbitControls.js"
            }
        }
    </script>
    
    <!-- モジュールの読み込み -->
    <script type="module" src="./src/js/main.js"></script>
</body>
</html>
